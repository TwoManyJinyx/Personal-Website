<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/index.css">
    <title>Document</title>
    <script src="scripts/script.js"></script>
</head>

<body>

    

    <button id="themeToggle" class="mode-button"></button>
    
    <div class="background-container">
        
        <div class="clouds">
        <div class="cloud-circle-1"></div>
        <div class="cloud-circle-2"></div>
        <div class="cloud-circle-3"></div>
        <div class="cloud-circle-4"></div>
        <div class="cloud-circle-5"></div>
        <div class="cloud-circle-6"></div>
        <div class="cloud-circle-7"></div>
        <div class="cloud-circle-8"></div>
        </div>


        <svg width="0" height="0">
            <filter id="filter">
                <feTurbulence type="fractalNoise" baseFrequency=".01" numOctaves="10" />
                <feDisplacementMap in="SourceGraphic" scale="180" />
            </filter>
        </svg>


        <div class="gradient-background"></div>
        
        <!-- for dark mode -->
        <div class="stars dark"></div>
        
        <!-- for light mode -->
        <div class="sky dark"></div>
        
        <div class="moving-background">
            <!-- for dark mode -->
            <div class="shooting-star dark"></div>
            <div class="shooting-star dark"></div>
            <div class="shooting-star dark"></div>
            
            <!-- for light mode -->
        </div>
    </div>


    <div class="content-container">
        <div class="section">
            <h1>Welcome to my Website!</h1>
            <h3>Have a look around!</h3>
            <div class="shortcuts">
                <p>About</p>
                <p>Projects</p>
                <p>Skills</p>
                <p>Contacts</p>
            </div>
        </div>
        <div class="section">
            <h1>Welcome to Section 2</h1>
            <h3>Have a look around!</h3>
            <div class="shortcuts">
                <p>About</p>
                <p>Projects</p>
                <p>Skills</p>
                <p>Contacts</p>
            </div>
        </div>
        <div class="section">
            <h1>Welcome to Section 3</h1>
            <h3>Have a look around!</h3>
            <div class="shortcuts">
                <p>About</p>
                <p>Projects</p>
                <p>Skills</p>
                <p>Contacts</p>
            </div>
        </div>
    </div>
</body>
</html>
